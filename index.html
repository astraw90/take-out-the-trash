<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Out the Trash!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  .bg-shapes {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-shapes .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.08;
    animation: floatShape 20s ease-in-out infinite;
  }
  .bg-shapes .shape:nth-child(1) { width: 300px; height: 300px; background: #fff; top: 10%; left: -5%; animation-delay: 0s; }
  .bg-shapes .shape:nth-child(2) { width: 200px; height: 200px; background: #ffd700; top: 60%; right: -3%; animation-delay: -5s; }
  .bg-shapes .shape:nth-child(3) { width: 150px; height: 150px; background: #ff6b6b; top: 30%; right: 20%; animation-delay: -10s; }
  .bg-shapes .shape:nth-child(4) { width: 250px; height: 250px; background: #48dbfb; bottom: 5%; left: 15%; animation-delay: -15s; }
  .bg-shapes .shape:nth-child(5) { width: 180px; height: 180px; background: #ff9ff3; top: 5%; right: 40%; animation-delay: -8s; }

  @keyframes floatShape {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(30px, -30px) rotate(5deg); }
    50% { transform: translate(-20px, 20px) rotate(-3deg); }
    75% { transform: translate(15px, 10px) rotate(2deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    text-align: center;
  }

  .header { margin-bottom: 10px; }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    margin-bottom: 8px;
    animation: bounceIn 0.8s ease-out;
  }
  .header .subtitle {
    font-size: 1.2rem;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    max-width: 600px;
    margin: 0 auto 6px;
    line-height: 1.5;
  }
  .header .guiding-question {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: #ffd700;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    margin-bottom: 10px;
  }
  .header .instructions {
    font-size: 1rem;
    color: rgba(255,255,255,0.75);
    font-style: italic;
  }

  @keyframes bounceIn {
    0% { transform: scale(0.3) translateY(-40px); opacity: 0; }
    50% { transform: scale(1.05); opacity: 1; }
    70% { transform: scale(0.95); }
    100% { transform: scale(1) translateY(0); }
  }

  .trash-scene {
    position: relative;
    height: 200px;
    margin: 20px auto 30px;
    max-width: 400px;
  }

  .trash-can {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    cursor: pointer;
    transition: transform 0.3s ease;
  }
  .trash-can:hover { transform: translateX(-50%) scale(1.05); }
  .trash-can:hover .lid { transform: rotate(-25deg) translateY(-5px); }

  .trash-can .lid {
    width: 130px; height: 18px;
    background: linear-gradient(180deg, #8e8e8e, #6d6d6d);
    border-radius: 6px 6px 2px 2px;
    margin: 0 auto;
    position: relative; left: -5px;
    transform-origin: right bottom;
    transition: transform 0.4s ease;
    z-index: 2;
  }
  .trash-can .lid-handle {
    width: 40px; height: 8px;
    background: #555;
    border-radius: 4px;
    margin: 0 auto;
    position: relative; top: -4px; left: -5px;
    z-index: 3;
  }
  .trash-can .body {
    width: 120px; height: 140px;
    background: linear-gradient(180deg, #7d7d7d, #5a5a5a);
    border-radius: 4px 4px 12px 12px;
    position: relative;
    overflow: hidden;
    box-shadow: inset -8px 0 15px rgba(0,0,0,0.15), 3px 5px 15px rgba(0,0,0,0.3);
  }
  .trash-can .body::before {
    content: ''; position: absolute;
    top: 15px; bottom: 15px; left: 25px;
    width: 3px; background: rgba(0,0,0,0.15); border-radius: 2px;
  }
  .trash-can .body::after {
    content: ''; position: absolute;
    top: 15px; bottom: 15px; left: 55px;
    width: 3px; background: rgba(0,0,0,0.15); border-radius: 2px;
  }
  .trash-line-3 {
    position: absolute;
    top: 15px; bottom: 15px; left: 85px;
    width: 3px; background: rgba(0,0,0,0.15); border-radius: 2px;
  }

  .trash-can.open .lid { transform: rotate(-45deg) translateY(-10px); }

  .flying-paper {
    position: fixed;
    width: 60px; height: 70px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    z-index: 1000;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    font-size: 8px;
    color: #666;
    text-align: center;
    overflow: hidden;
    line-height: 1.2;
  }
  .flying-paper::before {
    content: ''; position: absolute;
    top: 0; right: 0;
    width: 15px; height: 15px;
    background: linear-gradient(135deg, transparent 50%, #e0e0e0 50%);
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    opacity: 0;
  }

  .counter-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 8px 24px;
    color: #fff;
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 30px;
    transition: transform 0.3s ease;
  }
  .counter-badge.bump { animation: bumpBadge 0.5s ease; }
  @keyframes bumpBadge {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .input-area {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    margin-bottom: 30px;
    backdrop-filter: blur(10px);
  }
  .input-area h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #5b4a9e;
    margin-bottom: 15px;
  }
  .input-area .form-fields {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .input-area .field-row {
    flex: 1;
    min-width: 200px;
    text-align: left;
  }
  .input-area .field-row label {
    display: block;
    font-size: 0.85rem;
    color: #999;
    margin-bottom: 4px;
  }
  .input-area .field-row input {
    width: 100%;
    padding: 10px 14px;
    border: 3px solid #e0d4f5;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    background: #fff;
    color: #333;
  }
  .input-area .field-row input:focus {
    border-color: #764ba2;
    box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.15);
  }
  .input-area .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
    flex-wrap: wrap;
    justify-content: center;
  }
  .input-area textarea {
    flex: 1;
    min-width: 250px;
    padding: 14px 18px;
    border: 3px solid #e0d4f5;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    resize: none;
  }
  .input-area textarea:focus {
    border-color: #764ba2;
    box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.15);
  }
  .submit-status {
    margin-top: 10px;
    font-size: 0.85rem;
    min-height: 20px;
  }
  .submit-status.error { color: #e74c3c; font-weight: 600; }
  .submit-status.saving { color: #999; }

  .toss-btn {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4);
    white-space: nowrap;
  }
  .toss-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(238, 90, 36, 0.5);
  }
  .toss-btn:active { transform: translateY(0); }
  .toss-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .recent-tosses {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .recent-tosses h3 {
    font-family: 'Fredoka One', cursive;
    color: #fff;
    font-size: 1.1rem;
    margin-bottom: 12px;
  }
  .toss-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .toss-chip {
    background: rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 600;
    animation: chipIn 0.4s ease-out;
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.5);
  }
  @keyframes chipIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .success-msg {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #2ecc71;
    color: white;
    padding: 12px 30px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 1rem;
    z-index: 1001;
    box-shadow: 0 4px 20px rgba(46, 204, 113, 0.4);
    transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  .success-msg.show { transform: translateX(-50%) translateY(0); }

  @keyframes trashWobble {
    0% { transform: translateX(-50%) rotate(0deg); }
    15% { transform: translateX(-50%) rotate(-8deg); }
    30% { transform: translateX(-50%) rotate(6deg); }
    45% { transform: translateX(-50%) rotate(-4deg); }
    60% { transform: translateX(-50%) rotate(2deg); }
    75% { transform: translateX(-50%) rotate(-1deg); }
    100% { transform: translateX(-50%) rotate(0deg); }
  }
  .trash-can.wobble { animation: trashWobble 0.6s ease-in-out; }

  @media (max-width: 600px) {
    .header h1 { font-size: 2rem; }
    .header .guiding-question { font-size: 1.2rem; }
    .input-area { padding: 20px; }
    .input-area .input-row { flex-direction: column; }
    .toss-btn { width: 100%; }
    .trash-scene { height: 160px; }
    .trash-can .body { width: 90px; height: 110px; }
    .trash-can .lid { width: 100px; }
  }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<div class="confetti-container" id="confettiContainer"></div>
<div class="success-msg" id="successMsg"></div>

<div class="container">
  <div class="header">
    <h1>Take Out the Trash!</h1>
    <p class="subtitle">Help us lighten the load. If there's something we're doing as a faculty that we could stop doing — toss it in the trash!</p>
    <p class="guiding-question">"What MUST we do?" — If it's not that, trash it!</p>
    <p class="instructions">Type your idea below and toss it in.</p>
  </div>

  <div class="trash-scene">
    <div class="trash-can" id="trashCan">
      <div class="lid-handle"></div>
      <div class="lid"></div>
      <div class="body">
        <div class="trash-line-3"></div>
      </div>
    </div>
  </div>

  <div class="counter-badge" id="counterBadge">Items trashed: <span id="trashCount">0</span></div>

  <div class="input-area">
    <h2>What should we stop doing?</h2>
    <div class="form-fields">
      <div class="field-row">
        <label>Your name (optional)</label>
        <input type="text" id="nameInput" placeholder="Anonymous is fine!">
      </div>
    </div>
    <div class="input-row">
      <textarea id="ideaInput" rows="2" placeholder="e.g. 'Weekly reports that nobody reads...'"></textarea>
      <button class="toss-btn" id="tossBtn">Toss It!</button>
    </div>
    <div class="submit-status" id="submitStatus"></div>
  </div>

  <div class="recent-tosses" id="recentTosses" style="display:none;">
    <h3>Recently Trashed</h3>
    <div class="toss-list" id="tossList"></div>
  </div>
</div>

<script>
  // ============================================================
  // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL BELOW
  // ============================================================
  var APPS_SCRIPT_URL = 'https://script.google.com/a/macros/cedarville.edu/s/AKfycbzf9datZoBJb3lzAU8bGnrIVY2Igpvf0_T5w_qW5D9B5hoW6nHQL70BbZkM1x3cUrUs/exec';
  // ============================================================

  var trashCount = 0;

  var successMessages = [
    "Into the trash it goes!",
    "Bye bye!",
    "Poof! Gone!",
    "Good riddance!",
    "One less thing!",
    "Launched into oblivion!",
    "See ya never!",
    "Direct hit!",
    "Trashed!",
    "Freedom!"
  ];

  function tossIdea() {
    var ideaInput = document.getElementById('ideaInput');
    var nameInput = document.getElementById('nameInput');
    var tossBtn = document.getElementById('tossBtn');
    var submitStatus = document.getElementById('submitStatus');

    var idea = ideaInput.value.trim();
    if (!idea) {
      ideaInput.style.borderColor = '#ff6b6b';
      ideaInput.focus();
      setTimeout(function() { ideaInput.style.borderColor = '#e0d4f5'; }, 1000);
      return;
    }

    var name = nameInput.value.trim();

    tossBtn.disabled = true;
    submitStatus.textContent = '';
    submitStatus.className = 'submit-status';

    // Play the animation
    playTossAnimation(idea);

    // Send to Notion via Apps Script
    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      console.log('Demo mode: would save', idea, name);
      submitStatus.textContent = 'Demo mode — connect Apps Script to save to Notion';
      submitStatus.className = 'submit-status error';
      return;
    }

    submitStatus.textContent = 'Saving to Notion...';
    submitStatus.className = 'submit-status saving';

    // Hidden iframe + form approach (reliable with Google Apps Script)
    var iframeName = 'trash_submit_' + Date.now();
    var iframe = document.createElement('iframe');
    iframe.name = iframeName;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    var form = document.createElement('form');
    form.method = 'POST';
    form.action = APPS_SCRIPT_URL;
    form.target = iframeName;
    form.style.display = 'none';

    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify({ idea: idea, name: name });
    form.appendChild(input);

    document.body.appendChild(form);
    form.submit();

    setTimeout(function() {
      submitStatus.textContent = '';
      try { form.remove(); iframe.remove(); } catch(e) {}
    }, 3000);
  }

  function playTossAnimation(idea) {
    var ideaInput = document.getElementById('ideaInput');
    var trashCan = document.getElementById('trashCan');
    var tossBtn = document.getElementById('tossBtn');
    var counterBadge = document.getElementById('counterBadge');
    var successMsg = document.getElementById('successMsg');
    var confettiContainer = document.getElementById('confettiContainer');

    var paper = document.createElement('div');
    paper.className = 'flying-paper';
    paper.textContent = idea.length > 30 ? idea.substring(0, 30) + '...' : idea;

    var inputRect = ideaInput.getBoundingClientRect();
    paper.style.left = (inputRect.left + inputRect.width / 2 - 30) + 'px';
    paper.style.top = inputRect.top + 'px';
    document.body.appendChild(paper);

    var trashRect = trashCan.getBoundingClientRect();
    var trashCenterX = trashRect.left + trashRect.width / 2 - 30;
    var trashTopY = trashRect.top + 10;

    trashCan.classList.add('open');

    var startX = parseFloat(paper.style.left);
    var startY = parseFloat(paper.style.top);
    var duration = 800;
    var animStart = performance.now();

    function animatePaper(currentTime) {
      var elapsed = currentTime - animStart;
      var progress = Math.min(elapsed / duration, 1);
      var ease = 1 - Math.pow(1 - progress, 3);

      var arcHeight = -200;
      var x = startX + (trashCenterX - startX) * ease;
      var y = startY + (trashTopY - startY) * ease + arcHeight * Math.sin(Math.PI * progress);
      var rotation = progress * 720;
      var scale = 1 - progress * 0.5;

      paper.style.left = x + 'px';
      paper.style.top = y + 'px';
      paper.style.transform = 'rotate(' + rotation + 'deg) scale(' + scale + ')';
      paper.style.opacity = 1 - progress * 0.3;

      if (progress < 1) {
        requestAnimationFrame(animatePaper);
      } else {
        paper.remove();
        trashCan.classList.remove('open');
        trashCan.classList.add('wobble');
        setTimeout(function() { trashCan.classList.remove('wobble'); }, 600);

        createConfetti(trashCenterX + 30, trashTopY);

        trashCount++;
        document.getElementById('trashCount').textContent = trashCount;
        counterBadge.classList.add('bump');
        setTimeout(function() { counterBadge.classList.remove('bump'); }, 500);

        var msg = successMessages[Math.floor(Math.random() * successMessages.length)];
        successMsg.textContent = msg;
        successMsg.classList.add('show');
        setTimeout(function() { successMsg.classList.remove('show'); }, 2000);

        addTossChip(idea);

        ideaInput.value = '';
        tossBtn.disabled = false;
        ideaInput.focus();
      }
    }

    requestAnimationFrame(animatePaper);
  }

  function addTossChip(idea) {
    var recentTosses = document.getElementById('recentTosses');
    var tossList = document.getElementById('tossList');
    recentTosses.style.display = 'block';
    var chip = document.createElement('div');
    chip.className = 'toss-chip';
    chip.textContent = idea.length > 40 ? idea.substring(0, 40) + '...' : idea;
    tossList.insertBefore(chip, tossList.firstChild);
    while (tossList.children.length > 10) {
      tossList.removeChild(tossList.lastChild);
    }
  }

  function createConfetti(x, y) {
    var colors = ['#ff6b6b', '#ffd700', '#48dbfb', '#ff9ff3', '#2ecc71', '#fd79a8', '#fdcb6e', '#6c5ce7'];
    var container = document.getElementById('confettiContainer');

    for (var i = 0; i < 30; i++) {
      var piece = document.createElement('div');
      piece.className = 'confetti-piece';
      var color = colors[Math.floor(Math.random() * colors.length)];
      var size = 6 + Math.random() * 8;

      piece.style.width = size + 'px';
      piece.style.height = size + 'px';
      piece.style.left = x + 'px';
      piece.style.top = y + 'px';

      if (Math.random() > 0.5) {
        piece.style.borderRadius = '50%';
        piece.style.background = color;
      } else {
        piece.style.background = color;
      }

      container.appendChild(piece);

      (function(p, startX, startY) {
        var angle = Math.random() * Math.PI * 2;
        var velocity = 150 + Math.random() * 300;
        var vx = Math.cos(angle) * velocity;
        var vy = Math.sin(angle) * velocity - 200;
        var rotSpeed = (Math.random() - 0.5) * 1000;
        var pieceStart = performance.now();
        var gravity = 600;

        function animate(currentTime) {
          var elapsed = (currentTime - pieceStart) / 1000;
          if (elapsed > 2) { p.remove(); return; }

          var cx = startX + vx * elapsed;
          var cy = startY + vy * elapsed + 0.5 * gravity * elapsed * elapsed;
          var rot = rotSpeed * elapsed;
          var opacity = Math.max(0, 1 - elapsed / 2);

          p.style.left = cx + 'px';
          p.style.top = cy + 'px';
          p.style.transform = 'rotate(' + rot + 'deg)';
          p.style.opacity = opacity;

          requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
      })(piece, x, y);
    }
  }

  // Enter key to submit
  document.getElementById('ideaInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      tossIdea();
    }
  });

  // Click toss button
  document.getElementById('tossBtn').addEventListener('click', function() {
    tossIdea();
  });

  // Click trash can for fun wobble
  document.getElementById('trashCan').addEventListener('click', function() {
    this.classList.add('wobble');
    var self = this;
    setTimeout(function() { self.classList.remove('wobble'); }, 600);
  });
</script>

</body>
</html>
